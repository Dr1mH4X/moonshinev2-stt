services:
  moonshine-stt:
    build: .
    container_name: moonshine-stt
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
    environment:
      MODEL_PATH: /models
      MODEL_NAME: moonshine-v2
      NUM_THREADS: "4"
      DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
